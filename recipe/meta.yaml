{% set versions = {
    "1.0": "53a867616f7ae0b03928c5a9db4b1b04a6b29794c9492a96b19dfea64b1c856d"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'emela')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://github.com/gstagnit/eMELA/archive/v{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}
  folder: source
  patches:
    - 0001-support-range-of-cmakes.patch

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('gfortran') }}
    - cmake
    - make
  host:
    - libboost-devel
    - lhapdf
  run:
    - lhapdf

test:
  commands:
    - test -f $PREFIX/include/eMELA/eMELA.hh
    - test -f $PREFIX/lib/libeMELA${SHLIB_EXT}
    - test -f $PREFIX/bin/eMELA-config
    - eMELA-config --help

about:
  home: "https://github.com/gstagnit/eMELA"
  license: "MIT"
  license_file: source/LICENSE
  summary: "eMELA: electroweak parton distributions and matched EW-QCD calculations"
  description: |
    eMELA implements the pure-QED evolution of unpolarised electron PDFs up
    to NLL, an improved QED version of MELA, with optional LHAPDF-format
    grid output.

extra:
  recipe-maintainers:
    - meiyasan
